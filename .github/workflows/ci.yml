name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black ruff pytest pyyaml
      - name: Format check
        run: black --check .
      - name: Lint
        run: ruff check .
      - name: Compile Python
        run: python -m compileall projects
      - name: Run tests when present
        run: |
          if find projects -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            pytest
          else
            echo "No tests found."
          fi
